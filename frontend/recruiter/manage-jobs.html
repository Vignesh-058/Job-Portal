<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Jobs - JobPortal</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="..//index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./post-job.html">Post a Job</a>
      <a href="./manage-jobs.html" class="active">Manage Jobs</a>
    </aside>

    <main class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: center;" class="mb-2">
        <h2>Manage Jobs</h2>
        <a href="./post-job.html" class="btn btn-primary">Post New Job</a>
      </div>

      <div class="card">
        <div id="jobsContainer">
          <p class="text-muted text-center p-2">Loading jobs...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/jobs.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) document.getElementById('userName').innerText = user.name;
      loadJobs();
    });

    async function loadJobs() {
      const container = document.getElementById('jobsContainer');
      try {
        const jobsResponse = await getMyJobs();
        
        // Extract array from paginated format if necessary
        let jobs = [];
        if (jobsResponse.data && Array.isArray(jobsResponse.data)) {
          jobs = jobsResponse.data;
        } else if (Array.isArray(jobsResponse)) {
          jobs = jobsResponse;
        }
        
        if (jobs.length === 0) {
          container.innerHTML = '<p class="text-muted text-center p-2">No jobs found. Start by posting one!</p>';
          return;
        }

        let html = '<table><thead><tr><th>Title</th><th>Location</th><th>Status</th><th>Posted</th><th>Actions</th></tr></thead><tbody>';
        jobs.forEach(job => {
          const date = new Date(job.createdAt).toLocaleDateString();
          html += `
            <tr>
              <td style="font-weight: 500;">${job.title}</td>
              <td>${job.location}</td>
              <td>
                <span class="badge ${job.isActive ? 'badge-shortlisted' : 'badge-rejected'}">
                  ${job.isActive ? 'Active' : 'Closed'}
                </span>
              </td>
              <td>${date}</td>
              <td>
                <div style="display: flex; gap: 0.5rem;">
                  <a href="./view-applicants.html?jobId=${job._id}" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">Applicants</a>
                  <button onclick="toggleJobStatus('${job._id}', ${!job.isActive})" class="btn btn-accent" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">
                    ${job.isActive ? 'Close' : 'Open'}
                  </button>
                  <button onclick="deleteJobHandler('${job._id}')" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (error) {
        container.innerHTML = '<p class="text-danger p-2 text-center">Failed to load jobs.</p>';
      }
    }

    async function toggleJobStatus(id, newStatus) {
      if(!confirm(`Are you sure you want to ${newStatus ? 'open' : 'close'} this job?`)) return;
      try {
        await updateJob(id, { isActive: newStatus });
        showToast('Job status updated');
        loadJobs();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function deleteJobHandler(id) {
      if(!confirm('Are you sure you want to delete this job? This action cannot be undone.')) return;
      try {
        await deleteJob(id);
        showToast('Job deleted');
        loadJobs();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }
  </script>
</body>
</html>
