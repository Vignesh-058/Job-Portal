<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Dashboard - JobPortal</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="..//index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="active">Dashboard Stats</a>
      <a href="#" id="nav-companies">Manage Companies</a>
      <a href="post-job.html">Post a New Job</a>
      <a href="manage-jobs.html">Manage Jobs</a>
      <a href="view-applicants.html">View Applicants</a>
    </aside>

    <main class="main-content">
      <h2 class="mb-2">Welcome, <span id="welcomeName">Recruiter</span></h2>
      
      <div class="grid grid-2 mb-2">
        <div class="card" style="border-left: 4px solid var(--primary);">
          <h3 class="text-muted" style="font-size: 1rem; margin-bottom: 0.5rem;">Total Applications</h3>
          <p id="totalApplications" style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">0</p>
        </div>
        <div class="card" style="border-left: 4px solid var(--success);">
          <h3 class="text-muted" style="font-size: 1rem; margin-bottom: 0.5rem;">Hiring Rate</h3>
          <p id="hiringRate" style="font-size: 2.5rem; font-weight: 700; color: var(--success);">0%</p>
        </div>
      </div>

      <div class="card mb-2">
        <h3 class="mb-1">Application Trends</h3>
        <canvas id="trendsChart" width="400" height="150"></canvas>
      </div>
      
      <div class="card">
        <h3 class="mb-1">Recent Job Postings</h3>
        <div id="recentJobsContainer">
          <p class="text-muted">Loading...</p>
        </div>
      </div>

      <!-- Manage Companies Section (Hidden by default) -->
      <div id="companies-section" style="display: none; margin-top: 2rem;">
        <div class="flex justify-between align-center mb-2">
          <h2>My Companies</h2>
          <button id="showCompanyFormBtn" class="btn btn-primary">Add New Company</button>
        </div>

        <div id="companyFormContainer" class="card mb-2" style="display: none;">
          <h3 class="mb-1">Create Company</h3>
          <form id="companyForm">
            <div class="form-group">
              <label>Company Name</label>
              <input type="text" id="companyName" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Website URL</label>
              <input type="url" id="companyWebsite" class="form-control">
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="companyDescription" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-accent">Save Company</button>
          </form>
        </div>

        <div class="grid grid-2" id="companiesList">
          <!-- Companies will be injected here -->
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/company.js"></script>
  <script src="../js/jobs.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) {
        document.getElementById('userName').innerText = user.name;
        document.getElementById('welcomeName').innerText = user.name;
      }

      try {
        // Fetch Dashboard Analytics
        const analyticsRes = await fetch('https://job-portal-8lb8.onrender.com/api/v1/recruiter/analytics', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const analytics = await analyticsRes.json();
        
        document.getElementById('totalApplications').innerText = analytics.totalApplications || 0;
        document.getElementById('hiringRate').innerText = analytics.hiringRate || '0%';

        // Render Chart
        if (analytics.monthlyTrends && analytics.monthlyTrends.length > 0) {
          const ctx = document.getElementById('trendsChart').getContext('2d');
          
          const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          const labels = analytics.monthlyTrends.map(t => monthNames[t._id - 1]);
          const data = analytics.monthlyTrends.map(t => t.count);

          new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{
                label: 'Applications',
                data: data,
                borderColor: 'rgba(99, 102, 241, 1)',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
              }]
            },
            options: {
              responsive: true,
              scales: {
                y: { beginAtZero: true }
              }
            }
          });
        }

        // Fetch Recent Jobs
        const jobsRes = await fetch('https://job-portal-8lb8.onrender.com/api/v1/jobs/my-jobs?limit=5', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const jobsData = await jobsRes.json();
        const jobs = jobsData.data || [];
        
        const container = document.getElementById('recentJobsContainer');
        if (jobs.length === 0) {
          container.innerHTML = '<p class="text-muted">You haven\'t posted any jobs yet.</p>';
          return;
        }

        let html = '<table><thead><tr><th>Title</th><th>Location</th><th>Type</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        jobs.forEach(job => {
          html += `
            <tr>
              <td style="font-weight: 500;">${job.title}</td>
              <td>${job.location}</td>
              <td><span class="badge" style="background: var(--border-color); color: var(--text-main);">${job.type}</span></td>
              <td>
                <span class="badge ${job.status === 'Active' ? 'badge-shortlisted' : 'badge-rejected'}">
                  ${job.status}
                </span>
              </td>
              <td>
                <a href="./view-applicants.html?jobId=${job._id}" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">View Applicants</a>
              </td>
            </tr>
          `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (error) {
        showToast('Error loading dashboard data', 'error');
      }
    });
  </script>
</body>
</html>
