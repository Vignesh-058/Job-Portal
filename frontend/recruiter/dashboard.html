<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Dashboard - JobPortal</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../../index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="./dashboard.html" class="active">Dashboard</a>
      <a href="./post-job.html">Post a Job</a>
      <a href="./manage-jobs.html">Manage Jobs</a>
    </aside>

    <main class="main-content">
      <h2 class="mb-2">Welcome, <span id="welcomeName">Recruiter</span></h2>
      
      <div class="grid grid-2 mb-2">
        <div class="card" style="border-left: 4px solid var(--primary);">
          <h3 class="text-muted" style="font-size: 1rem; margin-bottom: 0.5rem;">Total Jobs Posted</h3>
          <p id="totalJobs" style="font-size: 2.5rem; font-weight: 700; color: var(--primary);">0</p>
        </div>
        <div class="card" style="border-left: 4px solid var(--accent);">
          <h3 class="text-muted" style="font-size: 1rem; margin-bottom: 0.5rem;">Active Jobs</h3>
          <p id="activeJobs" style="font-size: 2.5rem; font-weight: 700; color: var(--accent);">0</p>
        </div>
      </div>
      
      <div class="card">
        <h3 class="mb-1">Recent Job Postings</h3>
        <div id="recentJobsContainer">
          <p class="text-muted">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/jobs.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) {
        document.getElementById('userName').innerText = user.name;
        document.getElementById('welcomeName').innerText = user.name;
      }

      try {
        const jobs = await getMyJobs();
        
        document.getElementById('totalJobs').innerText = jobs.length;
        document.getElementById('activeJobs').innerText = jobs.filter(j => j.isActive).length;
        
        const container = document.getElementById('recentJobsContainer');
        if (jobs.length === 0) {
          container.innerHTML = '<p class="text-muted">You haven\'t posted any jobs yet.</p>';
          return;
        }

        let html = '<table><thead><tr><th>Title</th><th>Location</th><th>Type</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        jobs.slice(0, 5).forEach(job => {
          html += `
            <tr>
              <td style="font-weight: 500;">${job.title}</td>
              <td>${job.location}</td>
              <td><span class="badge" style="background: var(--border-color); color: var(--text-main);">${job.type}</span></td>
              <td>
                <span class="badge ${job.isActive ? 'badge-shortlisted' : 'badge-rejected'}">
                  ${job.isActive ? 'Active' : 'Closed'}
                </span>
              </td>
              <td>
                <a href="./view-applicants.html?jobId=${job._id}" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">View Applicants</a>
              </td>
            </tr>
          `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (error) {
        showToast('Error loading dashboard data', 'error');
      }
    });
  </script>
</body>
</html>
