<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Applicants - JobPortal</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="..//index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <span id="userName" style="font-weight: 600; margin-right: 1rem;"></span>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./post-job.html">Post a Job</a>
      <a href="./manage-jobs.html">Manage Jobs</a>
    </aside>

    <main class="main-content">
      <div class="mb-2">
        <a href="./manage-jobs.html" style="font-size: 0.9rem; margin-bottom: 1rem; display: inline-block;">&larr; Back to Jobs</a>
        <h2 id="jobTitleHeading">Applicants</h2>
      </div>

      <div class="card">
        <div id="applicantsContainer">
          <p class="text-muted text-center p-2">Loading applicants...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/applications.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) document.getElementById('userName').innerText = user.name;
      loadApplicants();
    });

    async function loadApplicants() {
      const urlParams = new URLSearchParams(window.location.search);
      const jobId = urlParams.get('jobId');
      const container = document.getElementById('applicantsContainer');

      if (!jobId) {
        container.innerHTML = '<p class="text-danger p-2 text-center">No job ID provided.</p>';
        return;
      }

      try {
        const response = await getJobApplicants(jobId);
        
        let applicants = [];
        if (response.data && Array.isArray(response.data)) {
          applicants = response.data;
        } else if (Array.isArray(response)) {
          applicants = response;
        }
        
        if (applicants.length === 0) {
          container.innerHTML = '<p class="text-muted text-center p-2">No applications received yet.</p>';
          return;
        }

        let html = '<table><thead><tr><th>Applicant Name</th><th>Email</th><th>Applied On</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        applicants.forEach(app => {
          const date = new Date(app.appliedAt).toLocaleDateString();
          const badgeClass = `badge-${app.status}`;
          
          html += `
            <tr>
              <td style="font-weight: 500;">${app.userId.name}</td>
              <td>${app.userId.email}</td>
              <td>${date}</td>
              <td>
                <span class="badge ${badgeClass}" style="text-transform: capitalize;">${app.status}</span>
              </td>
              <td>
                <select class="form-control" style="width: auto; display: inline-block; padding: 0.25rem;" onchange="updateStatus('${app._id}', this.value)">
                  <option value="pending" ${app.status === 'pending' ? 'selected' : ''}>Pending</option>
                  <option value="reviewed" ${app.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                  <option value="shortlisted" ${app.status === 'shortlisted' ? 'selected' : ''}>Shortlisted</option>
                  <option value="rejected" ${app.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                </select>
              </td>
            </tr>
          `;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (error) {
        container.innerHTML = '<p class="text-danger p-2 text-center">Failed to load applicants.</p>';
      }
    }

    async function updateStatus(applicationId, newStatus) {
      try {
        await updateApplicationStatus(applicationId, newStatus);
        showToast('Status updated successfully');
        loadApplicants(); // Reload to update badges
      } catch (error) {
        showToast(error.message, 'error');
      }
    }
  </script>
</body>
</html>
