<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - JobPortal</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body style="background-color: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column;">
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-brand">JobPortal</a>
    </div>
  </nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card auth-container" style="width: 100%; margin: 0;">
      <h2 class="text-center mb-2">Set New Password</h2>
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="otp">6-Digit OTP</label>
          <input type="text" id="otp" class="form-control" required placeholder="123456" minlength="6" maxlength="6" pattern="\d{6}">
        </div>
        <div class="form-group">
          <label for="password">New Password</label>
          <div style="position: relative;">
            <input type="password" id="password" class="form-control" required placeholder="••••••••" minlength="8" title="Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character" style="padding-right: 2.5rem;">
            <span onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1rem; user-select: none;">👁️</span>
          </div>
          <small class="text-muted" style="font-size: 0.8rem; display: block; margin-top: 0.5rem;">Must be 8+ chars with uppercase, lowercase, number, and special character.</small>
        </div>
        <div class="form-group mb-2">
          <label for="confirmPassword">Confirm Password</label>
          <div style="position: relative;">
            <input type="password" id="confirmPassword" class="form-control" required placeholder="••••••••" minlength="8" style="padding-right: 2.5rem;">
            <span onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1rem; user-select: none;">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">Reset Password</button>
      </form>
    </div>
  </main>

  <script src="./js/auth.js"></script>
  <script>
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerText = '🙈';
      } else {
        input.type = 'password';
        icon.innerText = '👁️';
      }
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const otp = document.getElementById('otp').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;

      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }
      
      try {
        submitBtn.innerText = 'Resetting...';
        submitBtn.disabled = true;

        const response = await fetch(`http://localhost:5000/api/auth/reset-password/${otp}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const responseData = await response.json();
        
        if (response.ok && responseData.success) {
          const data = responseData.data;
          localStorage.setItem('token', data.accessToken);
          localStorage.setItem('role', data.role);
          localStorage.setItem('user', JSON.stringify(data));

          showToast('Password reset successfully! Logging you in...');
          
          setTimeout(() => {
            if (data.role === 'recruiter') {
              window.location.href = './recruiter/dashboard.html';
            } else {
              window.location.href = './jobseeker/dashboard.html';
            }
          }, 2000);
        } else {
          showToast(responseData.message || 'Failed to reset password', 'error');
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        showToast('Network error. Is the backend running?', 'error');
        submitBtn.innerText = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
