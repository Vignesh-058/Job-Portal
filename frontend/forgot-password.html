<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - JobPortal</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body style="background-color: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column;">
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <a href="./login.html" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card auth-container" style="width: 100%; margin: 0;">
      <h2 class="text-center mb-2">Reset Your Password</h2>
      <p class="text-center text-muted mb-2" style="font-size: 0.9rem;">
        Enter your email address and we will send you a link to reset your password.
      </p>
      <form id="forgotPasswordForm">
        <div class="form-group mb-2">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="john@example.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">Send Reset Link</button>
      </form>
      <p class="text-center mt-1 text-muted">
        Remember your password? <a href="./login.html">Login here</a>
      </p>
    </div>
  </main>

  <script src="./js/auth.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;
      
      try {
        submitBtn.innerText = 'Sending...';
        submitBtn.disabled = true;

        const response = await fetch('http://localhost:5000/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const responseData = await response.json();
        
        if (response.ok && responseData.success) {
          showToast('OTP sent! Please check your email.');
          setTimeout(() => {
            window.location.href = './reset-password.html';
          }, 1500);
        } else {
          showToast(responseData.message || 'Failed to send reset link', 'error');
        }
      } catch (error) {
        showToast('Network error. Is the backend running?', 'error');
      } finally {
        submitBtn.innerText = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
