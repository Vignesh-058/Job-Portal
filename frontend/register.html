<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - JobPortal</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body style="background-color: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column;">
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-brand">JobPortal</a>
      <div class="nav-links">
        <a href="./login.html" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card auth-container" style="width: 100%; margin: 0;">
      <h2 class="text-center mb-2">Create an Account</h2>
      <form id="registerForm">
        <div class="form-group" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
          <label style="flex: 1; cursor: pointer;">
            <input type="radio" name="role" value="jobseeker" checked style="margin-right: 0.5rem;">
            I'm a Job Seeker
          </label>
          <label style="flex: 1; cursor: pointer;">
            <input type="radio" name="role" value="recruiter" style="margin-right: 0.5rem;">
            I'm a Recruiter
          </label>
        </div>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="password" class="form-control" required placeholder="••••••••" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}" title="Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character" style="padding-right: 2.5rem;">
            <span onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1rem; user-select: none;" title="Toggle Password Visibility">👁️</span>
          </div>
          <small class="text-muted" style="font-size: 0.8rem; display: block; margin-top: 0.5rem;">Must be 8+ chars with uppercase, lowercase, number, and special character.</small>
        </div>
        <div class="form-group mb-2">
          <label for="confirmPassword">Confirm Password</label>
          <div style="position: relative;">
            <input type="password" id="confirmPassword" class="form-control" required placeholder="••••••••" minlength="8" style="padding-right: 2.5rem;">
            <span onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1rem; user-select: none;" title="Toggle Password Visibility">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">Register</button>
      </form>
      <p class="text-center mt-1 text-muted">
        Already have an account? <a href="./login.html">Login here</a>
      </p>
    </div>
  </main>

  <script src="./js/auth.js"></script>
  <script>
    // Pre-select role based on URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    if (roleParam === 'recruiter' || roleParam === 'jobseeker') {
      document.querySelector(`input[name="role"][value="${roleParam}"]`).checked = true;
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerText = '🙈';
      } else {
        input.type = 'password';
        icon.innerText = '👁️';
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;
      
      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }
      
      try {
        submitBtn.innerText = 'Creating account...';
        submitBtn.disabled = true;

        const response = await fetch('https://job-portal-8lb8.onrender.com/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });
        
        const responseData = await response.json();
        
        if (response.ok && responseData.success) {
          showToast('Account created successfully! Please check your email to verify your account.');
          
          setTimeout(() => {
            window.location.href = './login.html';
          }, 3000);
        } else {
          showToast(responseData.message || 'Registration failed', 'error');
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        showToast('Network error. Is the backend running?', 'error');
        submitBtn.innerText = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
